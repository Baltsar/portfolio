<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Gustaf Garnow</title>
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #f5e6c8;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .terminal {
    max-width: 600px;
    font-size: 0.875rem;
    line-height: 2;
  }
  .prompt { color: #33ff33; text-shadow: 0 0 8px rgba(51,255,51,0.15); }
  .dim { color: #5c5040; }
  .error { color: #ff5f57; }
  .comment { color: #9c8b6e; }
  a {
    color: #33ff33;
    text-decoration: none;
    text-shadow: 0 0 8px rgba(51,255,51,0.15);
  }
  a:hover { text-decoration: underline; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 1.1em;
    background: #33ff33;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="terminal">
  <div><span class="prompt">gustaf@garnow:~$</span> cd /page-you-wanted</div>
  <div><span class="error">bash: cd: /page-you-wanted: No such file or directory</span></div>
  <br>
  <div><span class="prompt">gustaf@garnow:~$</span> ls</div>
  <div><span class="comment">index.html    that's it. it's a portfolio, not a CMS.</span></div>
  <br>
  <div><span class="prompt">gustaf@garnow:~$</span> <a href="/">> take me home</a><span class="cursor"></span></div>
</div>
</body>
</html>
